<!DOCTYPE html>

    <title>Identity URL Based Attack of Data</title>

<body>

    <header>
        <div class="container">
            <h1>Identity URL Based Attack of Data</h1>
            <p class="declaration"><strong>Project done by omprakash</strong></p>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <h2>URL / Data Security Checker</h2>
